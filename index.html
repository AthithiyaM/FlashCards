<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CSV/XLSX Flashcards</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app">
      <header class="header">
        <div class="brand">
          <img
            src="assets/reading-emoji.png"
            alt="Reading mascot"
            class="brand-image"
          />
          <div class="brand-text">
            <h1>CSV/XLSX Flashcards</h1>
            <p>Load a 2‑column CSV or XLSX and flip through the cards.</p>
          </div>
        </div>
        <div class="controls">
          <label class="file-input">
            <input
              id="csvFile"
              type="file"
              accept=".csv,text/csv,.xlsx,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"
            />
            <span>Choose CSV/XLSX</span>
          </label>
          <button id="clearBtn" type="button" class="secondary" disabled>Clear</button>
        </div>
      </header>

      <section class="status" id="status">No file loaded.</section>

      <section class="card-area" aria-live="polite">
        <button id="prevBtn" type="button" class="nav" disabled>Prev</button>
        <div class="card" id="card" role="button" tabindex="0" aria-label="Flashcard">
          <div class="card-inner">
            <div class="card-face card-front" id="cardFront">Load a CSV to begin</div>
            <div class="card-face card-back" id="cardBack">Back of card</div>
          </div>
        </div>
        <button id="nextBtn" type="button" class="nav" disabled>Next</button>
      </section>

      <section class="toolbar">
        <div class="progress">
          <span id="indexLabel">0</span>
          <span>/</span>
          <span id="countLabel">0</span>
        </div>
        <div class="view-tabs" role="tablist" aria-label="Card views">
          <button id="allTab" type="button" class="tab is-active" role="tab" aria-selected="true">
            All
          </button>
          <button id="badTab" type="button" class="tab" role="tab" aria-selected="false">
            Bad
          </button>
        </div>
        <div class="toolbar-actions">
          <button id="flipBtn" type="button" class="secondary" disabled>Flip</button>
          <button id="shuffleBtn" type="button" class="secondary" disabled>Shuffle</button>
          <button id="resetBtn" type="button" class="secondary" disabled>Reset Order</button>
          <button id="badBtn" type="button" class="secondary bad" disabled>Bad</button>
          <button id="goodBtn" type="button" class="secondary good" disabled>Good</button>
        </div>
      </section>

      <section class="help">
        <h2>File format</h2>
        <p>Use two columns: front, back. Works with CSV or XLSX. Example:</p>
        <pre><code>Capital of France,Paris
"2 + 2",4
"Term with, comma","Definition with, comma"</code></pre>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="app.js"></script>
  </body>
</html>
